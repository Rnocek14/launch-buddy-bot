name: Golden-10 Privacy Discovery Tests

on:
  pull_request:
    paths:
      - 'supabase/functions/discover-privacy-contacts/**'
      - 'golden10.ts'
      - 'golden10.config.json'
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  golden10:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Golden-10 Test Suite
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-golden10') }}
        run: node golden10.ts
        
      - name: Check Acceptance Gates
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-golden10') }}
        id: gates
        run: |
          PASS=$(jq '.pass' golden10.summary.json)
          MEDIAN=$(jq '.median_ms' golden10.summary.json)
          
          echo "Pass rate: $PASS/10"
          echo "Median time: ${MEDIAN}ms"
          
          if [ "$PASS" -lt 8 ]; then
            echo "❌ FAIL: Pass rate $PASS/10 is below gate (≥8/10)"
            jq -r '.results[] | select(.ok == false) | "  ❌ \(.domain): \(.error // .url)"' golden10.summary.json
            exit 1
          fi
          
          if [ "$MEDIAN" -gt 2500 ]; then
            echo "❌ FAIL: Median time ${MEDIAN}ms exceeds gate (≤2500ms)"
            jq -r '.results | sort_by(.time_ms) | reverse | .[:3] | .[] | "  🐌 \(.domain): \(.time_ms)ms"' golden10.summary.json
            exit 1
          fi
          
          echo "✅ All gates passed!"
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden10-summary
          path: golden10.summary.json
          retention-days: 30
      
      - name: Post to Slack (always)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            node tools/slack-notify.js golden10.summary.json "Golden-10 CI"
          else
            echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
          fi
      
      - name: Check gates & pre-alert
        id: gates
        run: |
          PASS=$(jq '.pass' golden10.summary.json)
          MEDIAN=$(jq '.median_ms' golden10.summary.json)
          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "median=$MEDIAN" >> $GITHUB_OUTPUT
          if [ "$PASS" -lt 8 ] || [ "$MEDIAN" -gt 2500 ]; then
            echo "GATES_FAIL=1" >> $GITHUB_OUTPUT
          else
            echo "GATES_FAIL=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Slack alert on gate fail
        if: steps.gates.outputs.GATES_FAIL == '1'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PASS=$(jq '.pass' golden10.summary.json)
            MEDIAN=$(jq '.median_ms' golden10.summary.json)
            TOTAL=$(jq '.total' golden10.summary.json)
            SHORT_SHA="${GITHUB_SHA:0:7}"
            WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            curl -X POST -H 'Content-Type: application/json' \
              -d "{\"text\":\"*Golden-10 CI – Gate FAILED*\n• Pass: ${PASS}/${TOTAL}\n• Median: ${MEDIAN}ms\n• Build: \\\`${SHORT_SHA}\\\` (<${WORKFLOW_URL}|workflow>)\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
      
      - name: Enforce gates (fail job if needed)
        run: |
          PASS=$(jq '.pass' golden10.summary.json)
          MEDIAN=$(jq '.median_ms' golden10.summary.json)
          if [ "$PASS" -lt 8 ] || [ "$MEDIAN" -gt 2500 ]; then
            echo "❌ Gate failed: pass=$PASS median=$MEDIAN"; exit 1
          fi
          echo "✅ All gates passed!"
      
      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('golden10.summary.json', 'utf8'));
            
            const passed = summary.results.filter(r => r.ok);
            const failed = summary.results.filter(r => !r.ok);
            
            let body = `## Golden-10 Test Results\n\n`;
            body += `- **Pass Rate:** ${summary.pass}/10 ${summary.pass >= 8 ? '✅' : '❌'}\n`;
            body += `- **Median Time:** ${summary.median_ms}ms ${summary.median_ms <= 2500 ? '✅' : '❌'}\n\n`;
            
            if (failed.length > 0) {
              body += `### Failed Domains\n`;
              failed.forEach(r => {
                body += `- ❌ **${r.domain}** (${r.time_ms}ms): ${r.error || r.url}\n`;
              });
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
