name: Golden-10 Privacy Discovery Tests

on:
  pull_request:
    paths:
      - 'supabase/functions/discover-privacy-contacts/**'
      - 'golden10.ts'
      - 'golden10.config.json'
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  golden10:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      
      - name: Run probe unit tests
        run: |
          deno test supabase/functions/_shared/probes.test.ts --allow-env || echo "⚠️ Probe tests failed (non-blocking)"
      
      - name: Run Golden-10 Test Suite
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-golden10') }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PROBE_SECURITY_TXT: true
          PROBE_SITEMAP: true
          DETECT_VENDOR: true
        run: npx tsx golden10.ts
      
      - name: Log Golden-10 Results to Database
        if: always() && hashFiles('golden10.summary.json') != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const url = require('url');
          
          try {
            const summary = JSON.parse(fs.readFileSync('golden10.summary.json', 'utf8'));
            
            const body = JSON.stringify({
              pass_rate_g10: summary.pass / summary.total,
              median_ms_g10: summary.median_ms,
              build_sha: process.env.GITHUB_SHA?.substring(0, 7) || null,
              build_ver: process.env.GITHUB_REF_NAME || null
            });
            
            const supabaseUrl = new url.URL('/rest/v1/golden_runs', process.env.SUPABASE_URL);
            const options = {
              method: 'POST',
              headers: {
                'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                'Authorization': 'Bearer ' + process.env.SUPABASE_SERVICE_ROLE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              }
            };
            
            const req = https.request(supabaseUrl, options, (res) => {
              if (res.statusCode >= 200 && res.statusCode < 300) {
                console.log('✅ Golden-10 results logged to database');
                process.exit(0);
              } else {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.error('❌ Failed to log results:', res.statusCode, data);
                  process.exit(1);
                });
              }
            });
            
            req.on('error', (err) => {
              console.error('❌ Request error:', err);
              process.exit(1);
            });
            
            req.write(body);
            req.end();
          } catch (err) {
            console.error('❌ Failed to log golden10 run:', err.message);
            process.exit(1);
          }
          "
        
      - name: Print precision@5 and vendor metrics
        if: always()
        run: |
          if [ -f golden10.summary.json ]; then
            node -e "
              const s = require('./golden10.summary.json');
              const p5 = s.results.filter(r => r.hit_in_top5 === true).length;
              const vendors = s.results.reduce((acc, r) => {
                const v = r.vendor || 'unknown';
                acc[v] = (acc[v] || 0) + 1;
                return acc;
              }, {});
              console.log('📊 Precision@5:', p5, '/', s.total, '(' + (p5/s.total*100).toFixed(1) + '%)');
              console.log('🔍 Vendor Detection:', JSON.stringify(vendors, null, 2));
            " || echo "⚠️ Could not parse metrics"
          fi
      
      - name: Check Acceptance Gates
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-golden10') }}
        id: gates
        run: |
          PASS=$(jq '.pass' golden10.summary.json)
          MEDIAN=$(jq '.median_ms' golden10.summary.json)
          
          echo "Pass rate: $PASS/10"
          echo "Median time: ${MEDIAN}ms"
          
          if [ "$PASS" -lt 8 ]; then
            echo "❌ FAIL: Pass rate $PASS/10 is below gate (≥8/10)"
            jq -r '.results[] | select(.ok == false) | "  ❌ \(.domain): \(.error // .url)"' golden10.summary.json
            exit 1
          fi
          
          if [ "$MEDIAN" -gt 2500 ]; then
            echo "❌ FAIL: Median time ${MEDIAN}ms exceeds gate (≤2500ms)"
            jq -r '.results | sort_by(.time_ms) | reverse | .[:3] | .[] | "  🐌 \(.domain): \(.time_ms)ms"' golden10.summary.json
            exit 1
          fi
          
          echo "✅ All gates passed!"
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden10-summary
          path: golden10.summary.json
          retention-days: 30
      
      - name: Post to Slack (always)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            node tools/slack-notify.js golden10.summary.json "Golden-10 CI"
          else
            echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
          fi
      
      - name: Check gates & pre-alert
        id: gates
        run: |
          PASS=$(jq '.pass' golden10.summary.json)
          MEDIAN=$(jq '.median_ms' golden10.summary.json)
          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "median=$MEDIAN" >> $GITHUB_OUTPUT
          if [ "$PASS" -lt 8 ] || [ "$MEDIAN" -gt 2500 ]; then
            echo "GATES_FAIL=1" >> $GITHUB_OUTPUT
          else
            echo "GATES_FAIL=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Slack alert on gate fail
        if: steps.gates.outputs.GATES_FAIL == '1'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PASS=$(jq '.pass' golden10.summary.json)
            MEDIAN=$(jq '.median_ms' golden10.summary.json)
            TOTAL=$(jq '.total' golden10.summary.json)
            SHORT_SHA="${GITHUB_SHA:0:7}"
            WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            curl -X POST -H 'Content-Type: application/json' \
              -d "{\"text\":\"*Golden-10 CI – Gate FAILED*\n• Pass: ${PASS}/${TOTAL}\n• Median: ${MEDIAN}ms\n• Build: \\\`${SHORT_SHA}\\\` (<${WORKFLOW_URL}|workflow>)\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
      
      - name: Enforce gates (fail job if needed)
        run: |
          PASS=$(jq '.pass' golden10.summary.json)
          MEDIAN=$(jq '.median_ms' golden10.summary.json)
          if [ "$PASS" -lt 8 ] || [ "$MEDIAN" -gt 2500 ]; then
            echo "❌ Gate failed: pass=$PASS median=$MEDIAN"; exit 1
          fi
          echo "✅ All gates passed!"
      
      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('golden10.summary.json', 'utf8'));
            
            const passed = summary.results.filter(r => r.ok);
            const failed = summary.results.filter(r => !r.ok);
            
            let body = `## Golden-10 Test Results\n\n`;
            body += `- **Pass Rate:** ${summary.pass}/10 ${summary.pass >= 8 ? '✅' : '❌'}\n`;
            body += `- **Median Time:** ${summary.median_ms}ms ${summary.median_ms <= 2500 ? '✅' : '❌'}\n\n`;
            
            if (failed.length > 0) {
              body += `### Failed Domains\n`;
              failed.forEach(r => {
                body += `- ❌ **${r.domain}** (${r.time_ms}ms): ${r.error || r.url}\n`;
              });
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
