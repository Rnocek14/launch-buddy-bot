name: Golden-25 (nightly)

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  golden25:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Golden-25 test suite
        run: node golden25.ts
        continue-on-error: true
      
      - name: Log Golden-25 Results to Database
        if: always() && hashFiles('golden25.summary.json') != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');
          const url = require('url');
          
          try {
            const summary = JSON.parse(fs.readFileSync('golden25.summary.json', 'utf8'));
            
            const body = JSON.stringify({
              pass_rate_g25: summary.pass / summary.total,
              median_ms_g25: summary.median_ms,
              build_sha: process.env.GITHUB_SHA?.substring(0, 7) || null,
              build_ver: process.env.GITHUB_REF_NAME || null
            });
            
            const supabaseUrl = new url.URL('/rest/v1/golden_runs', process.env.SUPABASE_URL);
            const options = {
              method: 'POST',
              headers: {
                'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                'Authorization': 'Bearer ' + process.env.SUPABASE_SERVICE_ROLE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              }
            };
            
            const req = https.request(supabaseUrl, options, (res) => {
              if (res.statusCode >= 200 && res.statusCode < 300) {
                console.log('✅ Golden-25 results logged to database');
                process.exit(0);
              } else {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.error('❌ Failed to log results:', res.statusCode, data);
                  process.exit(1);
                });
              }
            });
            
            req.on('error', (err) => {
              console.error('❌ Request error:', err);
              process.exit(1);
            });
            
            req.write(body);
            req.end();
          } catch (err) {
            console.error('❌ Failed to log golden25 run:', err.message);
            process.exit(1);
          }
          "
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden25-summary
          path: golden25.summary.json
      
      - name: Print metrics summary
        if: always()
        run: |
          if [ -f golden25.summary.json ]; then
            node -e "
            const s=require('./golden25.summary.json');
            const p5=s.results.filter(r=>r.hit_in_top5===true).length;
            const vendors=s.results.reduce((a,r)=>{a[r.vendor||'unknown']=(a[r.vendor||'unknown']||0)+1;return a;},{});
            console.log('📊 Precision@5:', p5,'/',s.total,'(', (p5/s.total*100).toFixed(1),'%)');
            console.log('🔍 Vendor counts:', JSON.stringify(vendors));
            " || true
          fi
      
      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL && always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -f golden25.summary.json ]; then
            node tools/slack-notify.js golden25.summary.json "Golden-25 nightly"
          fi
