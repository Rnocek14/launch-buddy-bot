name: Golden-25 (nightly)

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  golden25:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run Golden-25 test suite
        run: node golden25.ts
        continue-on-error: true
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: golden25-summary
          path: golden25.summary.json
      
      - name: Print metrics summary
        if: always()
        run: |
          if [ -f golden25.summary.json ]; then
            node -e "
            const s=require('./golden25.summary.json');
            const p5=s.results.filter(r=>r.hit_in_top5===true).length;
            const vendors=s.results.reduce((a,r)=>{a[r.vendor||'unknown']=(a[r.vendor||'unknown']||0)+1;return a;},{});
            console.log('📊 Precision@5:', p5,'/',s.total,'(', (p5/s.total*100).toFixed(1),'%)');
            console.log('🔍 Vendor counts:', JSON.stringify(vendors));
            " || true
          fi
      
      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL && always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -f golden25.summary.json ]; then
            node tools/slack-notify.js golden25.summary.json "Golden-25 nightly"
          fi
