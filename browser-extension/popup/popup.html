<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footprint Finder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 320px;
      background: #0f172a;
      color: #e2e8f0;
    }
    
    .container {
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #334155;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 11px;
      color: #94a3b8;
    }
    
    .status-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .status-row:last-child {
      margin-bottom: 0;
    }
    
    .status-label {
      font-size: 13px;
      color: #94a3b8;
    }
    
    .status-value {
      font-size: 13px;
      font-weight: 500;
    }
    
    .status-connected {
      color: #10b981;
    }
    
    .status-disconnected {
      color: #f59e0b;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: 0.2s;
      border-radius: 20px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.2s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background-color: #10b981;
    }
    
    input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }
    
    .services-list {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      max-height: 180px;
      overflow-y: auto;
    }
    
    .services-header {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    
    .services-count {
      background: #10b981;
      color: white;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 11px;
    }
    
    .service-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #334155;
      font-size: 12px;
    }
    
    .service-item:last-child {
      border-bottom: none;
    }
    
    .service-domain {
      color: #e2e8f0;
    }
    
    .service-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    .badge-synced {
      background: #065f46;
      color: #10b981;
    }
    
    .badge-pending {
      background: #78350f;
      color: #f59e0b;
    }
    
    .empty-state {
      text-align: center;
      padding: 16px;
      color: #94a3b8;
      font-size: 12px;
    }
    
    .button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .button:last-child {
      margin-bottom: 0;
    }
    
    .button-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    
    .button-primary:hover {
      opacity: 0.9;
    }
    
    .button-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    
    .button-secondary:hover {
      background: #475569;
    }
    
    .auth-section {
      text-align: center;
      padding: 20px 0;
    }
    
    .auth-message {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    
    .footer {
      text-align: center;
      font-size: 11px;
      color: #64748b;
      padding-top: 8px;
      border-top: 1px solid #334155;
    }
    
    .footer a {
      color: #10b981;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🔍</div>
      <div>
        <div class="title">Footprint Finder</div>
        <div class="subtitle">Account Detection</div>
      </div>
    </div>
    
    <div id="content">
      <!-- Content will be injected by JavaScript -->
    </div>
    
    <div class="footer">
      <a href="https://footprintfinder.app/dashboard" target="_blank">Open Dashboard</a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
